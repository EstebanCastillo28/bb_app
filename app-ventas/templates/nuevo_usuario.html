<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Nuevo Usuario</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0D1117] text-[#F0F6FC] p-6 flex justify-center items-center min-h-screen">
    <div class="max-w-sm w-full bg-[#161B22] border border-[#30363D] rounded-lg p-6 space-y-4 shadow-xl">
        <div class="flex justify-between items-center"><h2 class="text-sm font-bold text-white">CREAR NUEVO ACCESO</h2><a href="/dashboard" class="text-xs text-gray-400">Volver</a></div>
        <form method="POST" class="space-y-4">
            <div><label class="block text-[10px] text-gray-400 mb-1">Usuario</label><input type="text" name="username" required class="w-full bg-[#1C2230] border border-[#30363D] rounded p-2 text-sm text-white focus:outline-none"></div>
            <div><label class="block text-[10px] text-gray-400 mb-1">Contraseña</label><input type="password" name="password" required class="w-full bg-[#1C2230] border border-[#30363D] rounded p-2 text-sm text-white focus:outline-none"></div>
            <div><label class="block text-[10px] text-gray-400 mb-1">Rol Operativo</label>
                <select name="role" class="w-full bg-[#1C2230] border border-[#30363D] rounded p-2 text-sm text-white focus:outline-none">
                    <option value="VENDEDOR">Vendedor</option><option value="ADMIN">Administrador</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold py-2.5 rounded cursor-pointer">CREAR USUARIO</button>
        </form>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Registrar Abono</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0D1117] text-[#F0F6FC] p-6 flex justify-center items-center min-h-screen">
    <div class="max-w-sm w-full bg-[#161B22] border border-[#30363D] rounded-lg p-6 space-y-4 shadow-xl">
        <div class="flex justify-between items-center"><h2 class="text-sm font-bold text-white">REGISTRO DE PAGO / COMISIÓN</h2><a href="/dashboard" class="text-xs text-gray-400">Volver</a></div>
        <form method="POST" enctype="multipart/form-data" class="space-y-4">
            <div>
                <label class="block text-[10px] text-gray-400 mb-1">Asignar a Vendedor</label>
                <select name="vendedor_id" required class="w-full bg-[#1C2230] border border-[#30363D] rounded p-2 text-sm text-white focus:outline-none">
                    {% for v in vendedores %}<option value="{{ v.id }}">{{ v.username }}</option>{% endfor %}
                </select>
            </div>
            <div><label class="block text-[10px] text-gray-400 mb-1">Monto del Pago ($)</label><input type="number" step="0.01" name="monto" required class="w-full bg-[#1C2230] border border-[#30363D] rounded p-2 text-sm text-white focus:outline-none"></div>
            <div><label class="block text-[10px] text-gray-400 mb-1">Detalle o Concepto</label><textarea name="observaciones" rows="2" class="w-full bg-[#1C2230] border border-[#30363D] rounded p-2 text-sm text-white focus:outline-none"></textarea></div>
            <div>
                <label class="block text-[10px] text-gray-400 mb-1">Cargar Comprobante Digital (PDF o Imagen)</label>
                <input type="file" name="comprobante" class="text-xs text-gray-500 w-full file:bg-[#212838] file:text-white file:border-none file:p-2 file:rounded file:cursor-pointer">
            </div>
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold py-2.5 rounded cursor-pointer">REGISTRAR EN COMPROBANTE</button>
        </form>
    </div>
</body>
</html>

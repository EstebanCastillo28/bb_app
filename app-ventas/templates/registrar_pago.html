<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar Pago</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0D1117] text-[#F0F6FC] min-h-screen flex flex-col justify-center items-center px-4 py-8">
  <div class="max-w-sm w-full bg-[#161B22] border border-[#30363D] rounded-lg p-6 space-y-4 shadow-xl">
    <div class="flex justify-between items-center">
      <h2 class="text-sm font-bold text-white">REGISTRO DE PAGO / COMISIÓN</h2>
      <a href="/dashboard" class="text-xs text-gray-400 hover:text-white py-1 px-2">← Volver</a>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="bg-red-950/40 border border-red-800 text-red-400 p-3 rounded text-xs text-center">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    <form method="POST" enctype="multipart/form-data" class="space-y-4">
      <div>
        <label class="block text-[10px] text-gray-400 mb-1">Asignar a Vendedor</label>
        <select name="vendedor_id" class="w-full bg-[#1C2230] border border-[#30363D] rounded p-3 text-sm text-white focus:outline-none">
          {% for v in vendedores %}
            <option value="{{ v.id }}">{{ v.username }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-[10px] text-gray-400 mb-1">Monto del Pago ($)</label>
        <input type="number" step="0.01" name="monto" required
          class="w-full bg-[#1C2230] border border-[#30363D] rounded p-3 text-sm text-white focus:outline-none">
      </div>
      <div>
        <label class="block text-[10px] text-gray-400 mb-1">Detalle o Concepto</label>
        <textarea name="observaciones" rows="3"
          class="w-full bg-[#1C2230] border border-[#30363D] rounded p-3 text-sm text-white focus:outline-none"></textarea>
      </div>
      <div>
        <label class="block text-[10px] text-gray-400 mb-1">Cargar Comprobante Digital (PDF o Imagen)</label>
        <input type="file" name="comprobante" accept="image/*,application/pdf"
          class="w-full text-gray-400 text-sm bg-[#1C2230] border border-[#30363D] rounded p-2">
      </div>
      <button type="submit"
        class="w-full bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 text-white text-xs font-bold py-3 rounded cursor-pointer">
        REGISTRAR EN COMPROBANTE
      </button>
    </form>
  </div>
</body>
</html>

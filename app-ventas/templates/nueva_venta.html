<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Nueva Venta</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0D1117] text-[#F0F6FC] p-6">
    <div class="max-w-2xl mx-auto bg-[#161B22] border border-[#30363D] rounded-lg shadow-xl overflow-hidden">
        <div class="bg-[#212838] px-6 py-4 border-b border-[#30363D] flex justify-between items-center">
            <h2 class="text-md font-bold text-white">FORMATO REGISTRO DE VENTA</h2>
            <a href="/dashboard" class="text-xs text-gray-400 hover:text-white">← Volver</a>
        </div>
        <form method="POST" enctype="multipart/form-data" class="p-6 space-y-6">
            <!-- Bloque Cliente -->
            <div class="space-y-4">
                <h3 class="text-xs font-bold text-emerald-400 border-b border-[#30363D] pb-1 uppercase tracking-wider">Información del Cliente</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] text-gray-400 mb-1">Nombre Completo</label>
                        <input type="text" name="nombre_cliente" required class="w-full bg-[#1C2230] border border-[#30363D] rounded p-2 text-sm text-white focus:outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] text-gray-400 mb-1">Tipo Doc</label>
                            <select name="tipo_doc" class="w-full bg-[#1C2230] border border-[#30363D] rounded p-2 text-sm text-white focus:outline-none">
                                <option>C.C.</option><option>C.E.</option><option>NIT</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] text-gray-400 mb-1">Número Documento</label>
                            <input type="text" name="nro_doc" required class="w-full bg-[#1C2230] border border-[#30363D] rounded p-2 text-sm text-white focus:outline-none">
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div><label class="block text-[10px] text-gray-400 mb-1">Correo</label><input type="email" name="correo" class="w-full bg-[#1C2230] border border-[#30363D] rounded p-2 text-sm text-white focus:outline-none"></div>
                    <div><label class="block text-[10px] text-gray-400 mb-1">Teléfono</label><input type="text" name="telefono" class="w-full bg-[#1C2230] border border-[#30363D] rounded p-2 text-sm text-white focus:outline-none"></div>
                    <div><label class="block text-[10px] text-gray-400 mb-1">Ciudad</label><input type="text" name="ciudad" class="w-full bg-[#1C2230] border border-[#30363D] rounded p-2 text-sm text-white focus:outline-none"></div>
                </div>
                <div><label class="block text-[10px] text-gray-400 mb-1">Dirección Completa</label><input type="text" name="direccion" class="w-full bg-[#1C2230] border border-[#30363D] rounded p-2 text-sm text-white focus:outline-none"></div>
            </div>

            <!-- Bloque Financiero -->
            <div class="space-y-4">
                <h3 class="text-xs font-bold text-emerald-400 border-b border-[#30363D] pb-1 uppercase tracking-wider">Datos de la Operación</h3>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div><label class="block text-[10px] text-gray-400 mb-1">Monto Financiado ($)</label><input type="number" step="0.01" name="monto_financiado" required class="w-full bg-[#1C2230] border border-[#30363D] rounded p-2 text-sm text-white focus:outline-none"></div>
                    <div><label class="block text-[10px] text-gray-400 mb-1">Número de Cuotas</label><input type="number" name="cantidad_cuotas" required class="w-full bg-[#1C2230] border border-[#30363D] rounded p-2 text-sm text-white focus:outline-none"></div>
                    <div><label class="block text-[10px] text-gray-400 mb-1">Producto Adquirido</label><input type="text" name="producto_financiado" required class="w-full bg-[#1C2230] border border-[#30363D] rounded p-2 text-sm text-white focus:outline-none"></div>
                </div>
                <div><label class="block text-[10px] text-gray-400 mb-1">Observaciones</label><textarea name="observaciones" rows="2" class="w-full bg-[#1C2230] border border-[#30363D] rounded p-2 text-sm text-white focus:outline-none"></textarea></div>
            </div>

            <!-- Bloque Archivos -->
            <div class="space-y-4">
                <h3 class="text-xs font-bold text-emerald-400 border-b border-[#30363D] pb-1 uppercase tracking-wider">Soportes Digitales (Máx 4.5MB combinados)</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-xs">
                    <div><label class="block text-gray-400 mb-1">Foto Documento Cliente</label><input type="file" name="foto_documento" class="text-gray-500"></div>
                    <div><label class="block text-gray-400 mb-1">Acta de Entrega Firmada</label><input type="file" name="acta_entrega" class="text-gray-500"></div>
                    <div><label class="block text-gray-400 mb-1">Foto del Cliente con el Producto</label><input type="file" name="foto_cliente_producto" class="text-gray-500"></div>
                    <div><label class="block text-gray-400 mb-1">Captura Aprobación Crédito</label><input type="file" name="captura_aprobacion" class="text-gray-500"></div>
                    <div class="sm:col-span-2"><label class="block text-gray-400 mb-1">Anexos Adicionales</label><input type="file" name="anexos_adicionales" class="text-gray-500"></div>
                </div>
            </div>

            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-bold py-3 rounded cursor-pointer">GUARDAR REGISTRO DE VENTA</button>
        </form>
    </div>
</body>
</html>
